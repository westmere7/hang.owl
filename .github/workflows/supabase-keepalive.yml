# Free-tier Supabase projects pause after ~7 days without activity.
# This cron hits the REST API every 3 days to keep the project awake.
#
# Repo secrets required (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL       e.g. https://abcdefgh.supabase.co
#   SUPABASE_ANON_KEY  the anon public key
name: Supabase keep-alive

on:
  schedule:
    - cron: '17 6 */3 * *' # 06:17 UTC every 3rd day
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $code"
          # Any 2xx/4xx means the project is awake; only fail on no response / 5xx.
          if [ "$code" -ge 500 ] || [ "$code" -eq 000 ]; then exit 1; fi
